name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # react-simple-maps has an unresolved React 19 peer dep — see CLAUDE.md
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run validate-data
      - run: npm test
      - run: npm run build
